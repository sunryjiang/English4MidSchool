<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>背单词 · 初中英语四周提升</title>
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="style.css?v=6" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-title">背单词</span>
      <span class="brand-sub">MODULE · WORDS</span>
    </div>
    <nav class="mod-nav">
      <a href="index.html">首页</a>
      <a href="grammar.html">语法</a>
      <a href="vocab.html" class="active">背单词</a>
      <a href="reading.html">阅读</a>
      <a href="plan.html">计划</a>
    </nav>
  </header>

  <main class="vocab-wrap">
    <aside class="vocab-side">
      <h3>选择单元</h3>
      <div id="unitList" class="unit-list"></div>
    </aside>

    <section class="vocab-main">
      <div id="vocabToolbar" class="vocab-toolbar hidden">
        <div class="vt-info">
          <span id="vtTitle" class="vt-title"></span>
          <span id="vtProgress" class="vt-progress"></span>
        </div>
        <div class="vt-controls">
          <label class="vt-check"><input type="checkbox" id="autoPlay" /> 翻卡自动读</label>
          <label class="vt-check"><input type="checkbox" id="showCn" checked /> 显示中文</label>
        </div>
      </div>

      <div id="cardArea" class="card-area">
        <div class="vocab-empty">← 请从左侧选择一个单元开始背单词</div>
      </div>

      <div id="cardControls" class="card-controls hidden">
        <button id="prevBtn" class="cc-btn">← 上一个</button>
        <button id="speakBtn" class="cc-btn primary">🔊 朗读</button>
        <button id="flipBtn" class="cc-btn">翻面（看释义）</button>
        <button id="knownBtn" class="cc-btn ok">✓ 认识</button>
        <button id="nextBtn" class="cc-btn">下一个 →</button>
      </div>
    </section>
  </main>

  <script src="vocab.js?v=6"></script>
</body>
</html>
