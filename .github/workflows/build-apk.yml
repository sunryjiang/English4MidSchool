name: 构建安卓 APK

# 每次推送代码到 GitHub，或在 Actions 页面手动点击运行时，都会自动打包
on:
  push:
    branches: ["**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 安装 JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: 准备 Android SDK
        uses: android-actions/setup-android@v3

      - name: 安装依赖
        run: npm ci

      - name: 同步 Capacitor 到安卓工程
        run: npx cap sync android

      - name: 编译 Debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: 上传 APK（在本次运行页面底部 Artifacts 下载）
        uses: actions/upload-artifact@v4
        with:
          name: chuzhong-yingyu-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
